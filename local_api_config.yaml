# 本机联调配置：通过 SSH 端口转发，所有服务在 localhost 上可达。
#   LLM       -> localhost:8000  (/models/Qwen3.5-9B)
#   reranker  -> localhost:8001  (/models/Qwen3-Reranker-4B)
#   embedding -> localhost:8002  (/models/Qwen3-Embedding-4B, dim 2560)
#   Milvus    -> localhost:19530 (server 模式)
# 这些与 default_config.yaml 默认一致，这里显式声明便于复现。

embedding:
  api_base: "http://localhost:8002/v1"
  api_key: "${VLLM_API_KEY}"
  # 注意: 8002 上的 vLLM 实际注册的 model id 是 /Qwen3-Embedding-4B
  # (没有 /models 前缀, 与 8000/8001 不同)。用错名字会 404 → embed 步骤失败 →
  # 不入库 (chunk 仍报 118, 但 row_count=0)。
  model: "/Qwen3-Embedding-4B"

milvus:
  backend: "server"
  server:
    uri: "http://localhost:19530"
    token: ""
    db_name: ""

retrieval:
  langgraph:
    reflection:
      api_base: "http://localhost:8000/v1"
    reranker:
      api_base: "http://localhost:8001/v1"
      api_key: "${VLLM_API_KEY}"

generation:
  api_base: "http://localhost:8000/v1"
  api_key: "${VLLM_API_KEY}"
