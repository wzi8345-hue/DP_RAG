# DP-RAG 容器服务一键编排
# 与 docs/容器部署文档.md、docs/start-services.sh 中的 docker run 命令一致。
#
# 工作目录 (在此执行 compose, 且含三个模型子目录):
#   /fs_mol/wangzhengyan/
#     docker-compose.yml          # 可复制本文件到工作目录
#     Qwen3-Embedding-4B/
#     Qwen3-Reranker-4B/
#     Qwen3.5-9B/
#
# 环境变量 (可写入同目录 .env, 见 docs/.env.example):
#   VLLM_API_KEY=dp_rag_vllm_sk_8f3a9c2e1b7d4f6a
#   mkdir -p /fs_mol/wangzhengyan/dp-rag-milvus
#
# 启动:
#   mkdir -p /fs_mol/wangzhengyan/dp-rag-milvus
#   cd /fs_mol/wangzhengyan   # Milvus 数据固定挂载见 milvus-standalone.volumes
#   docker compose -f docker-compose.yml up -d        # V2
#   docker-compose -f docker-compose.yml up -d          # V1 (带连字符)

x-vllm-logging: &vllm-logging
  driver: json-file
  options:
    max-size: "50m"
    max-file: "3"

# 三个 vllm-* 服务共用同一镜像与 GPU/日志/重启配置, 用锚点复用一份。
# pull_policy: missing —— 镜像本地已存在就不再拉取, 避免对同一镜像重复 pull。
x-vllm-base: &vllm-base
  image: vllm/vllm-openai:latest
  pull_policy: missing
  logging: *vllm-logging
  deploy:
    resources:
      reservations:
        devices:
          - driver: nvidia
            count: all
            capabilities: [gpu]
  restart: unless-stopped

services:
  # ── Milvus 向量库 (单机版, 内嵌 etcd) ──────────────────────────
  # 纯 CPU 运行: 不引用 x-vllm-base 锚点, 无任何 GPU 预留 (standalone 镜像本就不用 GPU)。
  milvus-standalone:
    image: milvusdb/milvus:v2.5.4
    container_name: milvus-standalone
    command: ["milvus", "run", "standalone"]
    security_opt:
      - seccomp:unconfined
    environment:
      ETCD_USE_EMBED: "true"
      ETCD_DATA_DIR: "/var/lib/milvus/etcd"
      COMMON_STORAGETYPE: "local"
    ports:
      - "19530:19530"
      - "9091:9091"
    volumes:
      - /fs_mol/wangzhengyan/dp-rag-milvus:/var/lib/milvus
    restart: unless-stopped

  # ── Embedding: Qwen3-Embedding-4B (端口 8002) ─────────────────
  vllm-embed:
    <<: *vllm-base
    container_name: vllm-embed
    ports:
      - "8002:8002"
    volumes:
      - ./Qwen3-Embedding-4B:/Qwen3-Embedding-4B:ro
    command:
      - /Qwen3-Embedding-4B
      - --host
      - "0.0.0.0"
      - --port
      - "8002"
      - --api-key
      - ${VLLM_API_KEY:-dp_rag_vllm_sk_8f3a9c2e1b7d4f6a}
      - --trust-remote-code
      - --gpu-memory-utilization
      - "0.25"
      - --max-model-len
      - "9216"
    # /health 仅在模型完全加载就绪后才返 200; 作为顺序启动的"就绪信号"。
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8002/health')\""]
      interval: 20s
      timeout: 10s
      retries: 60
      start_period: 60s

  # ── Reranker: Qwen3-Reranker-4B (端口 8001) ───────────────────
  # 顺序启动: 等 vllm-embed 就绪 (healthy) 后再启, 避免三个模型同时加载挤爆显存。
  vllm-rerank:
    <<: *vllm-base
    container_name: vllm-rerank
    depends_on:
      vllm-embed:
        condition: service_healthy
    ports:
      - "8001:8001"
    volumes:
      - ./Qwen3-Reranker-4B:/models/Qwen3-Reranker-4B:ro
    command:
      - /models/Qwen3-Reranker-4B
      - --host
      - "0.0.0.0"
      - --port
      - "8001"
      - --api-key
      - ${VLLM_API_KEY:-dp_rag_vllm_sk_8f3a9c2e1b7d4f6a}
      - --trust-remote-code
      - --gpu-memory-utilization
      - "0.25"
      - --max-model-len
      - "10240"
      - --hf_overrides
      - '{"architectures": ["Qwen3ForSequenceClassification"], "classifier_from_token": ["no", "yes"], "is_original_qwen3_reranker": true}'
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8001/health')\""]
      interval: 20s
      timeout: 10s
      retries: 60
      start_period: 60s

  # ── 生成 LLM: Qwen3.5-9B (端口 8000) ──────────────────────────
  # 顺序启动: 等 vllm-rerank 就绪 (healthy) 后再启 (最后加载, 占显存最大 0.5)。
  vllm-llm:
    <<: *vllm-base
    container_name: vllm-llm
    depends_on:
      vllm-rerank:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./Qwen3.5-9B:/models/Qwen3.5-9B:ro
    command:
      - --model
      - /models/Qwen3.5-9B
      - --host
      - "0.0.0.0"
      - --port
      - "8000"
      - --api-key
      - ${VLLM_API_KEY:-dp_rag_vllm_sk_8f3a9c2e1b7d4f6a}
      - --max-model-len
      - "30960"
      - --gpu-memory-utilization
      - "0.5"
      - --max-num-seqs
      - "128"
      - --reasoning-parser
      - qwen3
      - --enable-auto-tool-choice
      - --tool-call-parser
      - hermes
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 20s
      timeout: 10s
      retries: 60
      start_period: 60s
