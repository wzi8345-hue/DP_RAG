name: Build & push backend image

on:
  push:
    branches: [main, master]
    paths:
      - 'backend/**'
      - '.github/workflows/build-backend.yml'
  workflow_dispatch:

env:
  REGISTRY: dp-harbor-registry.cn-zhangjiakou.cr.aliyuncs.com
  IMAGE: dplc/qsar

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compute image tag
        id: meta
        run: echo "tag=sci-loop_backend_$(date +%y%m%d)_${GITHUB_SHA:0:4}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Login to private registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DP_USERNAME }}
          password: ${{ secrets.DP_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ steps.meta.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE }}:sci-loop_backend_latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: echo "Pushed ${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ steps.meta.outputs.tag }}" >> "$GITHUB_STEP_SUMMARY"
