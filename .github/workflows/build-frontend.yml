name: Build & push frontend image

on:
  push:
    branches: [main, master]
    paths:
      - 'frontend/**'
      - '.github/workflows/build-frontend.yml'
  workflow_dispatch:

env:
  REGISTRY: dp-harbor-registry.cn-zhangjiakou.cr.aliyuncs.com
  IMAGE: dplc/qsar

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compute image tag
        id: meta
        run: echo "tag=sci-loop_frontend_$(date +%y%m%d)_${GITHUB_SHA:0:4}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Login to private registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DP_USERNAME }}
          password: ${{ secrets.DP_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          build-args: |
            VITE_API_BASE=https://funmg.dp.tech/sci-loop-api
            VITE_LOGTO_ENDPOINT=https://auth.dplink.cc/
            VITE_LOGTO_APP_ID=skjc9b4p12ykvz40vshjc
            VITE_LOGTO_RESOURCE=https://funmg.dp.tech/sci-loop-api
            VITE_LOGTO_SCOPES=all:data,email,profile
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ steps.meta.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE }}:sci-loop_frontend_latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: echo "Pushed ${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ steps.meta.outputs.tag }}" >> "$GITHUB_STEP_SUMMARY"
